apiVersion: v1
kind: Namespace
metadata:
  name: edict
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edict-config
  namespace: edict
data:
  default.json: |
    {
      "database": {
        "host": "postgres",
        "port": 5432,
        "name": "edict"
      },
      "redis": {
        "host": "redis",
        "port": 6379
      },
      "agent": {
        "timeout": 30,
        "max_retries": 3
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edict-agent
  namespace: edict
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edict-agent
  template:
    metadata:
      labels:
        app: edict-agent
    spec:
      containers:
      - name: agent
        image: edict:latest
        ports:
        - containerPort: 8080
        - containerPort: 3000
        env:
        - name: EDICT_ENV
          value: "production"
        - name: EDICT_DATABASE__HOST
          valueFrom:
            configMapKeyRef:
              name: edict-config
              key: database.host
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: edict-data
          mountPath: /app/data
      volumes:
      - name: edict-data
        persistentVolumeClaim:
          claimName: edict-data
---
apiVersion: v1
kind: Service
metadata:
  name: edict-service
  namespace: edict
spec:
  selector:
    app: edict-agent
  ports:
  - name: http
    port: 80
    targetPort: 8080
  - name: ws
    port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: edict-data
  namespace: edict
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: edict-hpa
  namespace: edict
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edict-agent
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
